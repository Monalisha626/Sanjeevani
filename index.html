<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjeevani - Offline AI Triage</title>
    <!-- Tailwind CSS for modern design -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-emerald-600 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                🩺 Sanjeevani <span class="text-xs bg-emerald-800 px-2 py-1 rounded-full uppercase tracking-wider font-semibold">Offline-First</span>
            </h1>
            <!-- Status Indicators -->
            <div class="flex items-center gap-4">
                <span id="connection-status" class="flex items-center gap-2 text-sm bg-emerald-700 px-3 py-1 rounded-full">
                    <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></span> 
                    <span id="status-text">Online</span>
                </span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto max-w-5xl p-4 flex-grow grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Left Side: Patient Form -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 text-emerald-800">New Patient Registration</h2>
            
            <form id="triage-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Patient Name</label>
                    <input type="text" id="patient-name" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">Age</label>
                        <input type="number" id="patient-age" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">Gender</label>
                        <select id="patient-gender" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Vital Signs (e.g., Temp, Pulse, BP)</label>
                    <input type="text" id="vitals" placeholder="e.g., Temp: 101F, Pulse: 90, BP: 120/80" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Symptoms & Chief Complaint</label>
                    <textarea id="symptoms" rows="4" required placeholder="Describe what the patient is feeling..." class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">
                    Triage & Save Case
                </button>
            </form>
        </section>

        <!-- Right Side: Saved Cases Queue -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-emerald-800">Local Queue</h2>
                <span id="queue-count" class="bg-slate-200 text-slate-700 text-xs font-bold px-2.5 py-1 rounded-full">0 Cases</span>
            </div>

            <!-- List of cases -->
            <div id="queue-list" class="space-y-3 overflow-y-auto flex-grow max-h-[450px]">
                <!-- Fallback empty state -->
                <div class="text-center py-16" id="empty-state">
                    <p class="text-4xl">📭</p>
                    <p class="mt-2 font-medium text-slate-400">No patient cases queued.</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs">
        <p>Sanjeevani Offline Triage System | Built with HTML & Tailwind</p>
    </footer>

    <!-- App Logic Link -->
    <script src="app.js"></script>
</body>
